<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Neon Bazaar Auth</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Manrope:wght@400;600;800&display=swap' rel='stylesheet'><style>:root{--bg:#07111f;--panel:#091a2d;--gold:#f7b733;--aqua:#00ffc2;--ink:#d4ecff}*{box-sizing:border-box}body{margin:0;font-family:Manrope,sans-serif;color:var(--ink);background:radial-gradient(circle at 20% 20%,#173964,transparent 40%),repeating-linear-gradient(120deg,#07111f,#07111f 10px,#08172a 10px,#08172a 20px);min-height:100vh;display:grid;place-items:center}.card{width:min(920px,95vw);background:linear-gradient(145deg,#081a2f,#0c1d32);border:1px solid #2a4c76;border-radius:24px;padding:28px;display:grid;grid-template-columns:1fr 1fr;gap:24px;box-shadow:0 30px 80px #0008;animation:rise .7s ease}@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}h1{font-family:Cinzel,serif;margin:0 0 8px;font-size:36px;color:var(--gold)}.left p{opacity:.85}input{width:100%;padding:12px;border-radius:10px;border:1px solid #39618e;background:#061426;color:var(--ink);margin:6px 0}button{margin-top:8px;padding:10px 14px;border:0;border-radius:12px;background:linear-gradient(90deg,var(--aqua),var(--gold));font-weight:800;cursor:pointer}#out{white-space:pre-wrap;font-size:12px;background:#05101d;padding:10px;border-radius:10px;min-height:120px}</style></head><body><div class='card'><div class='left'><h1>Neon Bazaar</h1><p>5 bosqichli signup va oddiy login demosi.</p><div id='out'></div></div><div><h3>Signup start</h3><input id='contact' placeholder='email yoki phone'><button onclick='start()'>Start</button><h3>Verify OTP</h3><input id='otp' placeholder='6 xonali code'><button onclick='verify()'>Verify</button><h3>Profile</h3><input id='full' placeholder='full_name'><input id='user' placeholder='username'><input id='pass' type='password' placeholder='password'><button onclick='profileSave()'>Save profile</button><h3>Avatar</h3><input type='file' id='avatar'><button onclick='avatarSave()'>Upload & Complete</button><h3>Login</h3><input id='loginId' placeholder='username/email/phone'><input id='lpass' type='password' placeholder='password'><button onclick='loginReq()'>Login</button></div></div><script>let sessionId='';const out=(d)=>document.getElementById('out').textContent=JSON.stringify(d,null,2);async function start(){const c=document.getElementById('contact').value;const body=c.includes('@')?{email:c}:{phone_number:c};const r=await fetch('/api/auth/signup/start/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();sessionId=d.session_id;out(d)}async function verify(){const r=await fetch('/api/auth/signup/verify/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,code:document.getElementById('otp').value})});out(await r.json())}async function profileSave(){const r=await fetch('/api/auth/signup/profile/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,full_name:full.value,username:user.value,password:pass.value})});out(await r.json())}async function avatarSave(){const f=new FormData();f.append('session_id',sessionId);if(avatar.files[0])f.append('avatar',avatar.files[0]);const r=await fetch('/api/auth/signup/avatar/',{method:'POST',body:f});out(await r.json())}async function loginReq(){const r=await fetch('/api/auth/login/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:loginId.value,password:lpass.value})});out(await r.json())}</script></body></html>
