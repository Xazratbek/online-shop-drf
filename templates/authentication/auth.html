<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Bazaar | Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0d0f1a;
      --panel:#13182a;
      --gold:#e2b96f;
      --cyan:#6ce7f5;
      --text:#f8f5ee;
      --muted:#9ea6bc;
      --danger:#ff6b8a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:grid;place-items:center;color:var(--text);
      font-family:"IBM Plex Mono", monospace;
      background:
        radial-gradient(circle at 20% 20%, #2e1f4f 0%, transparent 38%),
        radial-gradient(circle at 80% 70%, #004b60 0%, transparent 34%),
        linear-gradient(135deg, #090b12, #13172a 48%, #101625);
      overflow:hidden;
    }
    .frame{width:min(920px,92vw);display:grid;grid-template-columns:1.1fr 1fr;background:rgba(19,24,42,.86);backdrop-filter: blur(10px);border:1px solid #2a304f;border-radius:22px;box-shadow:0 30px 80px rgba(0,0,0,.45);animation:rise .8s ease both}
    .hero{padding:42px;position:relative}
    .hero h1{font-family:"Cinzel",serif;font-size:38px;margin:0 0 12px;color:var(--gold);letter-spacing:1px}
    .hero p{color:var(--muted);line-height:1.7}
    .glow{position:absolute;inset:auto 40px 30px auto;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,var(--cyan),transparent 65%);filter:blur(14px);opacity:.4}
    .card{padding:34px 32px}
    .tabs{display:flex;gap:10px;margin-bottom:20px}
    .tabs button{flex:1;padding:10px;border:1px solid #2d3659;background:transparent;color:var(--muted);border-radius:10px;cursor:pointer;transition:.25s}
    .tabs button.active{border-color:var(--gold);color:var(--gold);transform:translateY(-2px)}
    .field{display:flex;flex-direction:column;gap:6px;margin:10px 0}
    input{padding:11px 12px;border-radius:10px;border:1px solid #33406a;background:#0e1322;color:var(--text)}
    button.submit{margin-top:10px;width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(90deg,var(--gold),#ffd38f);color:#17120a;font-weight:700;cursor:pointer}
    .msg{margin-top:10px;font-size:13px;color:var(--cyan);min-height:18px}
    .err{color:var(--danger)}
    @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    @media(max-width:800px){.frame{grid-template-columns:1fr}.hero{display:none}}
  </style>
</head>
<body>
  <section class="frame">
    <aside class="hero">
      <h1>NEON BAZAAR</h1>
      <p>Do'koningizga xush kelibsiz. Tez ro'yxatdan o'ting yoki login qiling va mahsulotlarni boshqaring.</p>
      <div class="glow"></div>
    </aside>
    <main class="card">
      <div class="tabs">
        <button id="tabSignup" class="active">Sign Up</button>
        <button id="tabLogin">Login</button>
      </div>
      <form id="signupForm">
        <div class="field"><label>Username</label><input name="username" required></div>
        <div class="field"><label>Email</label><input name="email" type="email"></div>
        <div class="field"><label>Phone</label><input name="phone_number"></div>
        <div class="field"><label>Password</label><input name="password" type="password" required></div>
        <button class="submit" type="submit">Create account</button>
      </form>
      <form id="loginForm" style="display:none">
        <div class="field"><label>Username</label><input name="username" required></div>
        <div class="field"><label>Password</label><input name="password" type="password" required></div>
        <button class="submit" type="submit">Login now</button>
      </form>
      <div id="msg" class="msg"></div>
    </main>
  </section>
<script>
const tabSignup=document.getElementById('tabSignup');const tabLogin=document.getElementById('tabLogin');
const signupForm=document.getElementById('signupForm');const loginForm=document.getElementById('loginForm');const msg=document.getElementById('msg');
const show=(mode)=>{const s=mode==='signup';signupForm.style.display=s?'block':'none';loginForm.style.display=s?'none':'block';tabSignup.classList.toggle('active',s);tabLogin.classList.toggle('active',!s);msg.textContent='';msg.classList.remove('err')}

tabSignup.onclick=()=>show('signup');tabLogin.onclick=()=>show('login');

signupForm.onsubmit=async(e)=>{e.preventDefault();const data=Object.fromEntries(new FormData(signupForm));
if(!data.email && !data.phone_number){msg.textContent='Email yoki phone kiriting';msg.classList.add('err');return}
const r=await fetch('/api/auth/signup/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
const j=await r.json();if(r.ok){msg.textContent='Signup bo\'ldi ✅';msg.classList.remove('err');signupForm.reset();}else{msg.textContent=JSON.stringify(j);msg.classList.add('err')}}

loginForm.onsubmit=async(e)=>{e.preventDefault();const data=Object.fromEntries(new FormData(loginForm));
const r=await fetch('/api/auth/login/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
const j=await r.json();if(r.ok){localStorage.setItem('access',j.access);localStorage.setItem('refresh',j.refresh);msg.textContent='Login muvaffaqiyatli ✅ tokenlar saqlandi';msg.classList.remove('err');}else{msg.textContent=JSON.stringify(j);msg.classList.add('err')}}
</script>
</body>
</html>
